<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ladinia Distillery Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Preload Great Vibes font to prevent flash -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  </noscript>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background video -->
 <video autoplay loop muted playsinline id="bg-video">
    <source src="Untitled video - Made with Clipchamp.mp4" type="video/mp4">
  </video>

  <!-- Dark overlay -->
  <div class="overlay"></div>

  <!-- Logo -->
  <img src="Logo_LD-removebg-preview.png" alt="Ladinia Logo" id="fixed-logo">
  <img src="Logo_ld.png" alt="Ladinia Logo" class="logo">
  

  <!-- Main content -->
  <div class="content">
    <h1>Ladinia Distillery</h1>
    <div class="language-buttons">
      <button onclick="location.href='distillometer.html'">Enter Distillometer</button>
    </div>
  </div>

  <!--sound button-->
  <audio id="bg-audio" autoplay loop muted>
    <source src="Mountains Spirit0.mp3" type="audio/mpeg">
  </audio>
  <button id="sound-toggle">🔇</button>
  
  <script src="script.js"></script>
</body>
</html>
